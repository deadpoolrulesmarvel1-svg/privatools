name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  frontend:
    name: Frontend audit and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Type-check and build
        working-directory: frontend
        run: |
          npx tsc --noEmit -p tsconfig.app.json
          npm run build
          npm run check:bundle

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit root requirements
        # rembg advisories CVE-2026-40086 / GHSA-55v6-g8pm-pw4c list a fixed
        # 2.0.75 release, but PyPI currently exposes 2.0.69 as latest. Keep
        # auditing every other package and remove these ignores once a fixed
        # rembg artifact is actually published.
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2026-40086 --ignore-vuln GHSA-55v6-g8pm-pw4c
      - name: Audit backend requirements
        run: pip-audit -r backend/requirements.txt --ignore-vuln CVE-2026-40086 --ignore-vuln GHSA-55v6-g8pm-pw4c

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  sbom:
    name: Trivy SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: trivy-sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom
          path: trivy-sbom.cdx.json
