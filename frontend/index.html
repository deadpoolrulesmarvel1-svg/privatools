    <!-- Organization JSON-LD (server-rendered into HTML so AI crawlers see it without executing JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://privatools.me/#organization",
      "name": "PrivaTools",
      "url": "https://privatools.me",

      "license": "https://opensource.org/licenses/MIT",
      "sameAs": ["https://github.com/taiyeba-dg/privatools"],
      "contactPoint": {

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
    <!-- Google Analytics (GA4) — deferred to after first paint to protect LCP/INP -->
    <script>
      (function(){
        function loadGA(){
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-B3VWQ44MX1';
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-B3VWQ44MX1', { anonymize_ip: true });
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGA, { timeout: 4000 });
        } else {
          window.addEventListener('load', function(){ setTimeout(loadGA, 1500); });
        }
      })();
    </script>
  </body>
