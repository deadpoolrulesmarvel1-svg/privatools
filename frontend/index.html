    <!-- Organization JSON-LD (server-rendered into HTML so AI crawlers see it without executing JS) -->

  <body>
    <!-- Pre-hydration skip link — points at the AppShell's `<main id="main-content">`.
         Once React mounts, AppShell provides its own (duplicate but harmless) skip
         link with identical target, so the keyboard shortcut still works after
         hydration. -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[9999] focus:px-4 focus:py-2 focus:bg-foreground focus:text-background focus:rounded-md focus:text-sm">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service worker registration lives in src/lib/sw-register.ts so it
         runs in production only and handles updates correctly (skipWaiting +
         controllerchange reload). Don't re-add an inline registration here. -->
    <!-- First-party analytics proxy — no Google scripts in the browser. Disabled for DNT/GPC/local opt-out. -->
    <script>
      (function(){
        var GA_ID = 'G-B3VWQ44MX1';
        var OPT_OUT_KEY = 'pt-analytics-opt-out';
        var CLIENT_ID_KEY = 'pt-analytics-client-id';
        var sent = false;
        function storageOptOut(){
          try { return window.localStorage.getItem(OPT_OUT_KEY) === '1'; }
          catch (e) { return false; }
        }
        function browserPrivacySignal(){
          var nav = window.navigator || {};
          var dnt = nav.doNotTrack || nav.msDoNotTrack || window.doNotTrack;
          return nav.globalPrivacyControl === true || dnt === '1' || dnt === 'yes';
        }
        function analyticsDisabled(){
          return browserPrivacySignal() || storageOptOut();
        }
        function setDisableFlag(disabled){
          window['ga-disable-' + GA_ID] = !!disabled;
        }
        function randomId(){
          var bytes = new Uint32Array(2);
          if (window.crypto && window.crypto.getRandomValues) {
            window.crypto.getRandomValues(bytes);
            return String(bytes[0]) + '.' + String(bytes[1]);
          }
          return String(Date.now()) + '.' + String(Math.floor(Math.random() * 1000000000));
        }
        function clientId(){
          try {
            var existing = window.localStorage.getItem(CLIENT_ID_KEY);
            if (existing) return existing;
            var next = randomId();
            window.localStorage.setItem(CLIENT_ID_KEY, next);
            return next;
          } catch (e) {
            return randomId();
          }
        }
        function sendPageview(){
          if (sent) return;
          if (analyticsDisabled()) {
            setDisableFlag(true);
            return;
          }
          setDisableFlag(false);
          sent = true;
          var body = JSON.stringify({
            path: window.location.pathname,
            title: document.title,
            referrer: document.referrer,
            client_id: clientId()
          });
          if (navigator.sendBeacon) {
            navigator.sendBeacon('/api/analytics/pageview', new Blob([body], { type: 'application/json' }));
            return;
          }
          fetch('/api/analytics/pageview', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: body,
            keepalive: true,
            credentials: 'same-origin'
          }).catch(function(){});
        }
        window.ptSetAnalyticsDisabled = function(disabled){
          var effectiveDisabled = !!disabled || browserPrivacySignal() || storageOptOut();
          setDisableFlag(effectiveDisabled);
          if (!effectiveDisabled) sendPageview();
        };
        window.addEventListener('storage', function(event){
          if (event.key === OPT_OUT_KEY) window.ptSetAnalyticsDisabled(storageOptOut());
        });
        setDisableFlag(analyticsDisabled());
        if ('requestIdleCallback' in window) {
          requestIdleCallback(sendPageview, { timeout: 4000 });
        } else {
          window.addEventListener('load', function(){ setTimeout(sendPageview, 1500); });
        }
      })();
    </script>
  </body>
</html>
