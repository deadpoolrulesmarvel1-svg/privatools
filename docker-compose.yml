services:
  privatools:
    build: .
    # The deploy pulls the cosign-signed image release.yml builds on each tag
    # (PRIVATOOLS_IMAGE=ghcr.io/...:vX.Y.Z) and runs it with `up --no-build`,
    # avoiding a heavy rebuild on the VM. Defaults to the locally-built name for
    # `docker compose up --build` (local dev / build fallback).
    image: ${PRIVATOOLS_IMAGE:-privatools-privatools:latest}
    ports:
      # Bind to loopback only. The app is meant to sit behind the host's nginx
      # (which terminates TLS and proxies to 127.0.0.1:8000). The previous
      # "8000:8000" published on 0.0.0.0, exposing the app on the VM's public
      # IP and letting clients bypass nginx/TLS and the real-IP forwarding.
      - "127.0.0.1:8000:8000"
    volumes:
      - app-temp:/app/temp
    environment:
      - PRIVATOOLS_BUILD_SHA=${GIT_SHA:-unknown}
      - PORT=8000
      - ENVIRONMENT=production
      - REQUEST_TIMEOUT_SECONDS=300
      - TRUSTED_HOSTS=privatools.me,www.privatools.me,127.0.0.1,localhost
      - ALLOWED_ORIGINS=https://privatools.me,https://www.privatools.me
      # api-subdomain split (off by default). Set to https://api.privatools.me
      # — e.g. PUBLIC_API_BASE_URL=https://api.privatools.me in the VM env or a
      # .env file — to route the SPA's /api calls to a grey-clouded origin that
      # bypasses Cloudflare's 100 MB upload cap. The backend then injects the
      # runtime <meta> tag, widens the CSP connect-src, and auto-trusts the api
      # Host. Empty = same-origin (unchanged). See deploy/api-subdomain-split.md.
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    # Bound container stdout/stderr on disk. The default json-file driver is
    # unbounded — a 5xx storm or a left-on DEBUG session would fill the VM disk,
    # which fails temp writes -> /readyz 503 -> docker wedge. Cap at 5×50 MB.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # --- Container hardening (mirrors the systemd unit's posture) ---
    security_opt:
      - no-new-privileges:true   # a child process can't gain privileges via setuid
    cap_drop:
      - ALL                      # the app + ffmpeg/libreoffice/ghostscript need no Linux caps
    # read_only root fs is the one remaining hardening step. It needs writable
    # tmpfs mounts for the cache dirs the image redirects to /tmp (fontconfig,
    # numba) plus a writable libreoffice profile, and must NOT mask the baked
    # rembg model at /tmp/u2net. Enable after a smoke test of the weasyprint /
    # office / remove-background tools in a built container:
    #   read_only: true
    #   tmpfs:
    #     - /tmp/cache
    #     - /tmp/numba-cache
    #     - /run
    deploy:
      resources:
        limits:
          memory: 4G             # was 20G — effectively no cap on a small VM; matches the systemd MemoryMax
          cpus: '1.8'            # VM has 2 cores; cap at 1.8 (Docker rejects >2) and leave ~0.2 for the host/nginx
          pids: 512              # bound fork-bombs (libreoffice/ffmpeg fan-out); under deploy.* to avoid the pids_limit conflict
        reservations:
          memory: 512M
    healthcheck:
      # /readyz exercises the real deps (imports + temp-writable + free disk), so
      # "unhealthy" means the container genuinely can't serve — not merely
      # "process is up" (research O4). urlopen raises on the 503 a degraded
      # /readyz returns, failing the check. start_period gives the app time to
      # import its deps on first boot before failures are counted.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/readyz\").read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-temp:
