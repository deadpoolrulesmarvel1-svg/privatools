version: '3.8'

services:
  privatools:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app-temp:/app/temp
    environment:
      - PORT=8000
      - ENVIRONMENT=production
      - REQUEST_TIMEOUT_SECONDS=300
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 20G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\").read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-temp:
