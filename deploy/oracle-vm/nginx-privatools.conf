# PrivaTools — host nginx config for the Oracle VM (140.245.15.140).
#
# Drop-in replacement for /etc/nginx/sites-enabled/privatools that ADDS the
# following on top of the existing config you already have running:
#   1. Content-Security-Policy header (was missing)
#   2. /assets/ → immutable 1yr cache (Vite produces content-hashed names)
#   3. /sw.js → no-store (so SW updates land on next visit)
#   4. http2 on; (was implicit)
#   5. Permissions-Policy (minor extra defense)
#
# Apply with:
#   scp deploy/oracle-vm/nginx-privatools.conf ubuntu@140.245.15.140:/tmp/
#   ssh ubuntu@140.245.15.140 'sudo cp /etc/nginx/sites-enabled/privatools \
#       /home/ubuntu/nginx-backups/privatools.$(date +%s).bak && \
#     sudo cp /tmp/nginx-privatools.conf /etc/nginx/sites-enabled/privatools && \
#     sudo nginx -t && sudo systemctl reload nginx'
#
# Rollback (if anything goes wrong):
#   ssh ubuntu@140.245.15.140 'sudo cp $(ls -t /home/ubuntu/nginx-backups/*.bak | head -1) \
#     /etc/nginx/sites-enabled/privatools && sudo nginx -t && sudo systemctl reload nginx'

# Rate limiting zone (request frequency)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Connection-flood guard (concurrent connections per client IP). A real user
# holds only a handful — an upload or two across tabs — while a slowloris /
# socket flood opens hundreds. 24 is generous for normal use and lethal to a
# flood. limit_conn returns 503 when exceeded.
limit_conn_zone $binary_remote_addr zone=apiconn:10m;

# Real client IP. The apex is grey-clouded (DNS-only) on Cloudflare, so nginx
# sees the client directly and $binary_remote_addr above IS the real IP — the
# nginx limits and the app's rightmost-XFF rate-limit key therefore agree. If
# the apex is ever orange-clouded (Cloudflare proxy), $remote_addr becomes a CF
# edge IP and per-IP limiting would bucket every user into one zone slot, so
# uncomment the block below (keep the CF range list current) to trust the real
# client IP from CF-Connecting-IP:
#   set_real_ip_from 173.245.48.0/20;   # ...full Cloudflare IPv4 + IPv6 list...
#   real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name privatools.me www.privatools.me;
    return 301 https://privatools.me$request_uri;
}

server {
    # `ssl http2` combined form for nginx ≥ 1.9.5. The standalone
    # `http2 on;` directive is only valid on nginx ≥ 1.25 — the Oracle
    # VM is on 1.18 (Ubuntu 22.04) and would refuse to parse it.
    listen 443 ssl http2;
    server_name www.privatools.me;

    ssl_certificate /etc/letsencrypt/live/privatools.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privatools.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    return 301 https://privatools.me$request_uri;
}

server {
    # `ssl http2` combined form for nginx ≥ 1.9.5. The standalone
    # `http2 on;` directive is only valid on nginx ≥ 1.25 — the Oracle
    # VM is on 1.18 (Ubuntu 22.04) and would refuse to parse it.
    listen 443 ssl http2;
    server_name privatools.me;

    ssl_certificate /etc/letsencrypt/live/privatools.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privatools.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload limit + body timeouts (matches MAX_UPLOAD_MB=500 in backend)
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_body_buffer_size 128k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ──
    # nginx replaces (not merges) `add_header` directives when nested in a
    # `location` block, so each location below that uses add_header for
    # Cache-Control MUST re-declare the security headers it wants to keep.
    #
    # FastAPI also sets these headers for local/dev safety. Hide them at the
    # proxy boundary so public responses expose one canonical edge policy
    # instead of duplicate/intersected policies from two layers.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Permissions-Policy;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # FastAPI emits the canonical per-request nonce CSP for dynamic HTML/API
    # responses. Cached static locations that hide upstream CSP re-declare a
    # strict first-party policy below.
    #
    # api-subdomain split note: the SPA *document* (HTML) is served via the
    # default `location /` below, which does NOT override CSP — so FastAPI's
    # CSP governs what the page may fetch, and FastAPI widens connect-src to the
    # api origin when PUBLIC_API_BASE_URL is set. The static-location CSPs below
    # stay first-party ('self' only) on purpose: those responses (JS/CSS/fonts/
    # images/sw.js) never initiate /api calls, so they need no api origin.

    # ── Service worker: must not cache so updates propagate on next visit ──
    location = /sw.js {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; font-src 'self'; img-src 'self' blob: data:; connect-src 'self' https://huggingface.co https://cdn.jsdelivr.net; frame-ancestors 'none'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self'" always;
    }

    # ── Hashed Vite assets: content-hashed filenames, immutable forever.
    #    `^~` prefix beats the `~*` regex below. ──
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; font-src 'self'; img-src 'self' blob: data:; connect-src 'self' https://huggingface.co https://cdn.jsdelivr.net; frame-ancestors 'none'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:" always;
    }

    # Search/PWA metadata — short edge cache so generated AI/search files
    # update quickly without forcing every crawler hit to revalidate.
    location ~ ^/(manifest\.json|robots\.txt|llms\.txt|llms-full\.txt|opensearch\.xml)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; font-src 'self'; img-src 'self' blob: data:; connect-src 'self' https://huggingface.co https://cdn.jsdelivr.net; frame-ancestors 'none'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self'" always;
    }

    # Other static assets (icons, images, fonts, non-hashed JS/CSS) — 30d
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Cache-Control;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; font-src 'self'; img-src 'self' blob: data:; connect-src 'self' https://huggingface.co https://cdn.jsdelivr.net; frame-ancestors 'none'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self' blob:" always;
    }

    # API endpoints with rate limiting (nginx-layer, on top of the slowapi
    # per-IP limits the app now also enforces at the application layer)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn apiconn 24;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Default proxy → FastAPI catch-all (serves SPA HTML)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}

# ── api.privatools.me — direct API origin for the api-subdomain split ──
#
# Grey-clouded in Cloudflare (DNS-only → straight to this VM), so /api uploads
# bypass Cloudflare's proxy entirely: no 100 MB request-body cap (the free/pro
# plan limit) and no third party in the file path, while the apex + www can be
# orange-clouded for edge-cached static assets. Serves ONLY /api/* (the SPA's
# fetch target); everything else 404s so the marketing/SEO surface stays solely
# on privatools.me (no duplicate content on the api host).
#
# Activation also needs, in the backend env:
#     PUBLIC_API_BASE_URL=https://api.privatools.me
# (tells the SPA to use this origin via a runtime <meta> tag, widens the CSP
# connect-src, and trusts the api Host header), plus a cert:
#     sudo certbot certonly --nginx -d api.privatools.me
# See deploy/api-subdomain-split.md for the full ordered runbook.
server {
    listen 80;
    server_name api.privatools.me;
    # ACME HTTP-01 challenge for Let's Encrypt issuance + `certbot renew`
    # (webroot). api.privatools.me is grey-clouded, so this reaches the VM
    # directly — renewal is unaffected by Cloudflare. Everything else upgrades.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://api.privatools.me$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name api.privatools.me;

    ssl_certificate /etc/letsencrypt/live/api.privatools.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.privatools.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Match the main vhost so large uploads succeed end to end.
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_body_buffer_size 128k;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # API endpoints — same FastAPI upstream and the SAME `api` rate-limit zone
    # as the main vhost (declared once at the top). Sharing is intentional: the
    # zone keys on $binary_remote_addr, so it's a single per-IP API budget
    # across every PrivaTools origin — and the SPA only ever calls ONE of the
    # two /api hosts at a time, so there's no double-counting in practice.
    # FastAPI's CORSMiddleware emits the Access-Control-Allow-Origin headers for
    # https://privatools.me; nginx passes them through untouched. A cross-origin
    # upload sends an OPTIONS preflight then the POST, so burst=20 absorbs the 2×.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn apiconn 24;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Nothing else is a public surface on the api host.
    location / {
        return 404;
    }
}
